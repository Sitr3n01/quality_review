# Codex (OpenAI Agents SDK) configuration for the quality-gate skill.
#
# This file is read by Codex when the skill is enabled in a project. It controls
# how the skill is presented in the UI and the conditions under which Codex may
# invoke it implicitly.

interface:
  display_name: "Quality Gate"
  short_description: "Deterministic CI/CD quality gate for AI-assisted codebases"
  brand_color: "#3B82F6"
  default_prompt: >-
    Use the quality-gate skill to install, run, explain, or fix the
    deterministic CI/CD quality gate. Treat AI suggestions as advisory; the
    deterministic gate decides whether a PR passes.

policy:
  allow_implicit_invocation: true
  # When implicit invocation fires, Codex should still respect the skill's
  # internal hard rules — see SKILL.md and references/ai-review-policy.md.
