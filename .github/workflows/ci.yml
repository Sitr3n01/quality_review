name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, master, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, lint, test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.18.0, 20, 22]

    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies deterministically
        run: npm ci --no-audit --no-fund

      - name: Validate quality configuration
        run: npm run quality:validate

      - name: Write audit report
        run: npm run audit:report

      - name: Audit critical vulnerabilities
        run: npm audit --audit-level=critical

      - name: Audit high vulnerabilities
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint --if-present

      - name: Complexity report
        run: npm run complexity:ci

      - name: Duplication report
        run: npm run duplication:ci

      - name: Tests with coverage
        run: npm run test:coverage:ci --if-present

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-coverage-node-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: ignore
