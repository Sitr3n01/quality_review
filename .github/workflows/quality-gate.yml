name: Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: quality-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies deterministically
        run: npm ci --no-audit --no-fund

      - name: Validate quality configuration
        run: npm run quality:validate

      - name: Write audit report
        run: npm run audit:report

      - name: Audit critical vulnerabilities
        run: npm audit --audit-level=critical

      - name: Audit high vulnerabilities
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Run ESLint JSON report
        continue-on-error: true
        run: |
          mkdir -p reports/eslint
          npx --no-install eslint . --format json --output-file reports/eslint/eslint.json || true

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests with coverage
        run: npm run test:coverage:ci --if-present

      - name: Run duplication report
        run: npm run duplication:ci --if-present

      - name: Run complexity report
        run: npm run complexity:ci --if-present

      - name: Run quality gate
        id: quality_gate
        continue-on-error: true
        run: npm run quality:check

      - name: Render PR comment
        if: always()
        run: npm run quality:comment

      - name: Generate hybrid report artifacts
        if: always()
        continue-on-error: true
        run: npm run quality:hybrid-report

      - name: Write step summary
        if: always()
        run: |
          if [ -f reports/quality-gate.md ]; then
            cat reports/quality-gate.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Quality gate did not produce a Markdown report." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comment quality gate on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- quality-gate-comment -->';
            const path = 'reports/pr-comment.md';

            if (!fs.existsSync(path)) {
              core.warning('PR comment file not found.');
              return;
            }

            const body = fs.readFileSync(path, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.data.find((c) =>
              c.body && c.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-report
          path: |
            reports/
            coverage/
            .quality-gate/
          if-no-files-found: ignore

      - name: Fail if quality gate failed
        if: steps.quality_gate.outcome == 'failure'
        run: |
          echo "Quality gate produced blocking regressions. See the PR comment and the artifacts."
          exit 1
