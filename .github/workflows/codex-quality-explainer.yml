name: Codex Quality Explainer

# Opt-in workflow: Codex reads the quality gate output and writes a prose
# explanation as a PR comment. Read-only; cannot edit files.
#
# Triggers:
#   - Manual dispatch (workflow_dispatch).
#   - Label "ai-review" applied to a PR.
#   - Synchronization of a PR that already has the "ai-review" label.

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codex-quality-explainer:
    name: Codex Quality Explainer
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'ai-review'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download quality-gate artifact (if available)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: quality-gate-report
          path: .

      - name: Run Codex quality explainer
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/prompts/codex-quality-explainer.md
          output-file: reports/codex-quality-explainer.md
          sandbox: read-only
          safety-strategy: drop-sudo

      - name: Upload Codex output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-quality-explainer
          path: reports/codex-quality-explainer.md
          if-no-files-found: ignore

      - name: Comment Codex explanation on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- codex-quality-explainer -->';
            const path = 'reports/codex-quality-explainer.md';

            if (!fs.existsSync(path)) {
              core.warning('Codex output not found.');
              return;
            }

            const raw = fs.readFileSync(path, 'utf8');
            const body = raw.startsWith(marker) ? raw : `${marker}\n\n${raw}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });

            const existing = comments.data.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
